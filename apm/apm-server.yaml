apiVersion: apps/v1
kind: Deployment
metadata:
  name: apm-server
  labels:
    app: apm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apm-server
  template:
    metadata:
      labels:
        app: apm-server
    spec:
      containers:
      - name: apm-server
        image: docker.elastic.co/apm/apm-server:8.12.0
        command: ["apm-server", "-e", "-E", "apm-server.host=0.0.0.0:8200", "-E", "output.elasticsearch.hosts=['http://elasticsearch:9200']", "-E", "setup.kibana.host=kibana:5601"]
        ports:
        - containerPort: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: apm-server
spec:
  type: NodePort
  selector:
    app: apm-server
  ports:
  - port: 8200
    targetPort: 8200
    nodePort: 30820
