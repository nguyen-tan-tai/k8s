apiVersion: apps/v1
kind: Deployment
metadata:
  name: fujisan-demo
  labels:
    app: fujisan-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fujisan-demo
  template:
    metadata:
      labels:
        app: fujisan-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: spring-boot-app
        image: fujisan-demo:latest
        imagePullPolicy: IfNotPresent # Use local image if available (useful for Minikube/Docker Desktop)
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fujisan-demo
spec:
  type: NodePort
  selector:
    app: fujisan-demo
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30808 # Exposes the app to your local machine at localhost:30808