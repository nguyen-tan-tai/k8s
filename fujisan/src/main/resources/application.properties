spring.application.name=demo

# ==========================================
# Metrics: Prometheus (for Grafana)
# ==========================================
# Expose the /actuator/prometheus endpoint for scraping
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true
# Tag all metrics with the application name
management.metrics.tags.application=${spring.application.name}

# ==========================================
# Tracing: OpenTelemetry (for Tempo)
# ==========================================
management.tracing.enabled=true
# Sample 100% of traces for development/testing
management.tracing.sampling.probability=1.0
# Point to the Tempo service we deployed earlier (OTLP HTTP port 4318)
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
